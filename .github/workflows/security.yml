name: 🚀 Security + Quality Pipeline (Pro)

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:

  # 🔐 Segurança (com proteção para forks)
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    # 🚨 evita erro em PR de fork
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'

    strategy:
      matrix:
        tool: [codeql, gitleaks, trivy]

    steps:
      - uses: actions/checkout@v4

      # 🔐 CodeQL
      - name: Init CodeQL
        if: matrix.tool == 'codeql'
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        if: matrix.tool == 'codeql'
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        if: matrix.tool == 'codeql'
        uses: github/codeql-action/analyze@v3
        continue-on-error: true  # fallback extra de segurança

      # 🔑 Gitleaks
      - name: Run Gitleaks
        if: matrix.tool == 'gitleaks'
        uses: gitleaks/gitleaks-action@v2

      # 📦 Trivy
      - name: Run Trivy
        if: matrix.tool == 'trivy'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # 🧪 TESTES (paralelo por suite)
  tests:
    name: Tests (${{ matrix.suite }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        suite: [auth, policies, full]

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: gpp_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: "test-secret-key"
      DB_NAME: gpp_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
      - uses: actions/checkout@v4

      # ⚡ Setup + cache
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Extra pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Wait for Postgres
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          until pg_isready -h localhost -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done

      # 🎯 AUTH (SEM FAIL GLOBAL)
      - name: Run AUTH tests
        if: matrix.suite == 'auth'
        run: |
          pytest apps/accounts/tests/test_multi_cookie.py \
            --cov=apps/accounts/middleware \
            --cov-report=term-missing

      # 🎯 POLICIES (SEM FAIL GLOBAL)
      - name: Run POLICY tests
        if: matrix.suite == 'policies'
        run: |
          pytest apps/accounts/tests/policies/ \
            --cov=apps/accounts/policies \
            --cov-report=term-missing

      # 🎯 FULL (REGRA REAL)
      - name: Run FULL suite
        if: matrix.suite == 'full'
        run: |
          pytest \
            --cov=apps \
            --cov=common \
            --cov-report=term-missing \
            --cov-fail-under=80