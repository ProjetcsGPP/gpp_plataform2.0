name: 🚀 Security + Quality Pipeline (Pro)

on:
  pull_request:
  push:
    branches: ["main"]

jobs:

  # 🔐 Segurança roda em paralelo
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: [codeql, gitleaks, trivy]

    steps:
      - uses: actions/checkout@v4

      - name: Run CodeQL
        if: matrix.tool == 'codeql'
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - if: matrix.tool == 'codeql'
        uses: github/codeql-action/autobuild@v3

      - if: matrix.tool == 'codeql'
        uses: github/codeql-action/analyze@v3

      - name: Run Gitleaks
        if: matrix.tool == 'gitleaks'
        uses: gitleaks/gitleaks-action@v2

      - name: Run Trivy
        if: matrix.tool == 'trivy'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # 🧪 TESTES EM PARALELO (matrix por tipo)
  tests:
    name: Tests (${{ matrix.suite }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        suite: [auth, policies, full]

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: gpp_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: "test-secret-key"
      DB_NAME: gpp_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
      - uses: actions/checkout@v4

      # ⚡ Cache agressivo
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache venv extra (opcional turbo)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Wait for Postgres
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          until pg_isready -h localhost -U postgres; do
            sleep 2
          done

      # 🎯 Execução por tipo
      - name: Run AUTH tests
        if: matrix.suite == 'auth'
        run: |
          pytest apps/accounts/tests/test_multi_cookie.py \
            --cov=apps/accounts/middleware \
            --cov-report=term-missing \
            --cov-fail-under=85

      - name: Run POLICY tests
        if: matrix.suite == 'policies'
        run: |
          pytest apps/accounts/tests/policies/ \
            --cov=apps/accounts/policies \
            --cov-report=term-missing \
            --cov-fail-under=90

      - name: Run FULL suite
        if: matrix.suite == 'full'
        run: |
          pytest \
            --cov=apps \
            --cov=common \
            --cov-report=term-missing \
            --cov-fail-under=80