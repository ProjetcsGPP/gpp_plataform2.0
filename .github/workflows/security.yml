name: 🚀 Security + Quality Pipeline (Pro)

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:

  # 🔐 Segurança
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'

    strategy:
      matrix:
        tool: [codeql, gitleaks, trivy]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init CodeQL
        if: matrix.tool == 'codeql'
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        if: matrix.tool == 'codeql'
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        if: matrix.tool == 'codeql'
        uses: github/codeql-action/analyze@v3
        continue-on-error: true

      - name: Run Gitleaks
        if: matrix.tool == 'gitleaks'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy
        if: matrix.tool == 'trivy'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # 🧪 TESTES + QUALIDADE
  tests:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    name: Full Test Suite + Quality
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: gpp_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: "test-secret-key"
      DB_NAME: gpp_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Extra pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pylint flake8 radon

      - name: Wait for Postgres
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          until pg_isready -h localhost -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done

      # 🔍 CODE QUALITY (ANTES DOS TESTES)
      - name: Code Quality - Flake8
        run: |
          echo "🔍 Running Flake8..."
          flake8 apps

      - name: Code Quality - Pylint
        run: |
          echo "🔍 Running Pylint..."
          pylint apps --fail-under=7.5

      - name: Code Quality - Radon
        run: |
          echo "🔍 Running Radon..."
          radon cc apps -nc -s

      # 🧪 TESTES
      - name: Run FULL suite
        run: |
          pytest \
            --cov=apps \
            --cov=common \
            --cov-report=term-missing \
            --cov-fail-under=80
