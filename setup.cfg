[coverage:run]
source = apps, common
omit =
    */migrations/*
    */__init__.py
    */apps.py
    manage.py
    config/*
    */wsgi.py
    */asgi.py
    */tests/*
    */conftest.py
    */management/* 
branch = true

[coverage:report]
show_missing = True
fail_under = 80

[tool:unittest]
top_level_dir = .
