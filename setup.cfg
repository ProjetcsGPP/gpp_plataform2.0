[coverage:run]
source =
    apps
    common
omit =
    # Infra gerada automaticamente
    */migrations/*
    */__init__.py
    */apps.py
    manage.py
    config/*
    */wsgi.py
    */asgi.py
    */tests/*
    */conftest.py
    */management/* 
branch = true

[coverage:report]
show_missing = True
skip_covered = False
skip_empty = True
fail_under = 80
exclude_lines =
    # Diretiva explicita de exclusao
    pragma: no cover
    # Imports de tipagem estatica
    if TYPE_CHECKING:
    # Metodos abstratos (implementados nas subclasses)
    @abstractmethod
    raise NotImplementedError
    # Representacoes de debug
    def __repr__
    def __str__
    # Bloco main (scripts, nao aplicacao)
    if __name__ == .__main__.:

[tool:unittest]
top_level_dir = .
